spring.application.name=rest

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/employees
spring.datasource.username=root
spring.datasource.password=root

security.jwt.secret=${JWT_SECRET}
security.jwt.secret.issuer=swer-soa
security.jwt.secret.access-token-minutes=15
security.jwt.secret.refresh-token-days=7

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs

spring.profiles.active=local

#logging.level.root=DEBUG